<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VibxLinx Pulse</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --text-main: #f8fafc;
            --positive-color: #10b981; 
            --negative-color: #ef4444; 
            --neutral-color: #64748b;  
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            box-sizing: border-box;
        }

        .meter-container {
            width: 100%;
            max-width: 600px;
            background: #1e293b;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
            margin-bottom: 15px;
            box-sizing: border-box;
        }

        .meter-bar {
            width: 100%;
            height: 30px;
            background: #334155;
            border-radius: 15px;
            overflow: hidden;
            position: relative;
            margin-top: 15px;
        }

        .meter-fill {
            height: 100%;
            width: 50%;
            background: var(--neutral-color);
            border-radius: 15px;
            transition: width 0.3s ease, background-color 0.3s ease;
        }

        .score-display {
            font-size: 2rem;
            font-weight: bold;
            margin-top: 10px;
        }

        .channel-display {
            font-size: 1rem;
            color: var(--neutral-color);
            margin-left: 10px;
            font-weight: normal;
        }

        .chart-container {
            width: 100%;
            max-width: 600px;
            height: 150px; 
            background: #1e293b;
            border-radius: 20px;
            padding: 10px;
            margin-bottom: 15px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
            box-sizing: border-box;
        }

        .chat-container {
            width: 100%;
            max-width: 600px;
            flex-grow: 1;
            background: #1e293b;
            border-radius: 20px;
            padding: 20px;
            overflow-y: auto;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
            box-sizing: border-box;
        }

        .chat-message {
            padding: 10px;
            border-bottom: 1px solid #334155;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            animation: slideIn 0.3s ease-out;
        }
        
        .chat-content {
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            padding-right: 15px;
        }

        .badge {
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: bold;
            white-space: nowrap;
            margin-top: 2px;
        }

        .badge.positive { background: rgba(16, 185, 129, 0.2); color: var(--positive-color); }
        .badge.negative { background: rgba(239, 68, 68, 0.2); color: var(--negative-color); }
        .badge.neutral { background: rgba(100, 116, 139, 0.2); color: var(--neutral-color); }
        
        .topic-tags {
            margin-top: 6px;
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .tag {
            background-color: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            padding: 2px 8px;
            font-size: 0.75rem;
            color: #cbd5e1;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="meter-container">
        <h2>Live Community Vibe <span class="channel-display" id="channel-name"></span></h2>
        <div class="meter-bar">
            <div class="meter-fill" id="vibe-fill"></div>
        </div>
        <div class="score-display" id="vibe-score">⚪ NEUTRAL (0.00)</div>
    </div>

    <div class="chart-container">
        <canvas id="liveTimelineChart"></canvas>
    </div>

    <div class="chat-container" id="chat-feed">
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const targetChannel = urlParams.get('channel') || 'eslcs'; 
        document.getElementById('channel-name').innerText = `#${targetChannel}`;

        // 🧠 --- Smart Connection Logic ---
        // Detects if you are running this locally (127.0.0.1) or live on the internet
        const isLocal = window.location.hostname === "127.0.0.1" || window.location.hostname === "localhost" || window.location.hostname === "";
        
        const wsProtocol = isLocal ? "ws" : "wss"; 
        const backendDomain = isLocal ? "127.0.0.1:8000" : "vibxlins.onrender.com";
        
        const wsUrl = `${wsProtocol}://${backendDomain}/ws/pulse?channel=${targetChannel}`;
        const ws = new window.WebSocket(wsUrl);
        // --------------------------------

        const chatFeed = document.getElementById('chat-feed');
        const vibeFill = document.getElementById('vibe-fill');
        const vibeScoreText = document.getElementById('vibe-score');

        let recentScores = [];
        
        // --- Live Chart Setup ---
        const maxDataPoints = 40; 
        const ctx = document.getElementById('liveTimelineChart').getContext('2d');
        const liveChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: Array(maxDataPoints).fill(''), 
                datasets: [{
                    label: 'Sentiment Trend',
                    data: Array(maxDataPoints).fill(0), 
                    borderColor: '#3b82f6', 
                    backgroundColor: 'rgba(59, 130, 246, 0.2)',
                    borderWidth: 2,
                    tension: 0.4, 
                    fill: true,
                    pointRadius: 0 
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                animation: { duration: 200 }, 
                plugins: { legend: { display: false } }, 
                scales: {
                    x: { display: false }, 
                    y: {
                        type: 'linear',
                        display: true,
                        position: 'right',
                        min: -1.0,
                        max: 1.0,
                        grid: { color: '#334155' },
                        ticks: { color: '#94a3b8', font: { size: 10 } }
                    }
                }
            }
        });

        function escapeHTML(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        ws.onmessage = function(event) {
            const data = JSON.parse(event.data);
            
            recentScores.push(data.score);
            if (recentScores.length > 10) recentScores.shift();
            
            const avgScore = recentScores.reduce((a, b) => a + b, 0) / recentScores.length;
            const percentage = ((avgScore + 1) / 2) * 100;
            
            vibeFill.style.width = `${percentage}%`;

            if (avgScore > 0.2) {
                vibeFill.style.backgroundColor = 'var(--positive-color)';
                vibeScoreText.innerText = ` POSITIVE (${avgScore.toFixed(2)})`;
                vibeScoreText.style.color = 'var(--positive-color)';
                liveChart.data.datasets[0].borderColor = '#10b981'; 
            } else if (avgScore < -0.2) {
                vibeFill.style.backgroundColor = 'var(--negative-color)';
                vibeScoreText.innerText = ` NEGATIVE (${avgScore.toFixed(2)})`;
                vibeScoreText.style.color = 'var(--negative-color)';
                liveChart.data.datasets[0].borderColor = '#ef4444'; 
            } else {
                vibeFill.style.backgroundColor = 'var(--neutral-color)';
                vibeScoreText.innerText = ` NEUTRAL (${avgScore.toFixed(2)})`;
                vibeScoreText.style.color = 'var(--text-main)';
                liveChart.data.datasets[0].borderColor = '#3b82f6'; 
            }

            const chartData = liveChart.data.datasets[0].data;
            chartData.push(data.score); 
            if (chartData.length > maxDataPoints) {
                chartData.shift(); 
            }
            liveChart.update(); 

            const msgDiv = document.createElement('div');
            msgDiv.className = 'chat-message';
            
            let badgeClass = 'neutral';
            let badgeText = 'NEUTRAL';
            if (data.score > 0.4) { badgeClass = 'positive'; badgeText = 'POSITIVE'; }
            else if (data.score < -0.4) { badgeClass = 'negative'; badgeText = 'NEGATIVE'; }

            const topics = data.entities || [];
            let tagsHtml = '';
            if (topics.length > 0) {
                tagsHtml = '<div class="topic-tags">';
                topics.forEach(topic => {
                    tagsHtml += `<span class="tag">🏷️ ${escapeHTML(topic)}</span>`; 
                });
                tagsHtml += '</div>';
            }

            msgDiv.innerHTML = `
                <div class="chat-content">
                    <span><strong>${escapeHTML(data.username)}</strong>: ${escapeHTML(data.message)}</span>
                    ${tagsHtml}
                </div>
                <span class="badge ${badgeClass}">${badgeText}</span>
            `;
            
            chatFeed.insertBefore(msgDiv, chatFeed.firstChild);
            if (chatFeed.children.length > 50) {
                chatFeed.removeChild(chatFeed.lastChild);
            }
        };

        ws.onopen = () => console.log(`Connected to VibxLinx Engine listening to #${targetChannel}`);
        ws.onclose = () => console.log("Disconnected");
    </script>
</body>
</html>
