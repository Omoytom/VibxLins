<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VibxLinx Pulse</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --text-main: #f8fafc;
            --positive-color: #10b981; /* Green */
            --negative-color: #ef4444; /* Red */
            --neutral-color: #64748b;  /* Gray */
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .meter-container {
            width: 100%;
            max-width: 600px;
            background: #1e293b;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
            margin-bottom: 20px;
        }

        .meter-bar {
            width: 100%;
            height: 30px;
            background: #334155;
            border-radius: 15px;
            overflow: hidden;
            position: relative;
            margin-top: 15px;
        }

        .meter-fill {
            height: 100%;
            width: 50%;
            background: var(--neutral-color);
            border-radius: 15px;
            transition: width 0.3s ease, background-color 0.3s ease;
        }

        .score-display {
            font-size: 2rem;
            font-weight: bold;
            margin-top: 10px;
        }

        .chat-container {
            width: 100%;
            max-width: 600px;
            flex-grow: 1;
            background: #1e293b;
            border-radius: 20px;
            padding: 20px;
            overflow-y: auto;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
        }

        .chat-message {
            padding: 10px;
            border-bottom: 1px solid #334155;
            display: flex;
            justify-content: space-between;
            animation: slideIn 0.3s ease-out;
        }

        .badge {
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: bold;
        }

        .badge.positive { background: rgba(16, 185, 129, 0.2); color: var(--positive-color); }
        .badge.negative { background: rgba(239, 68, 68, 0.2); color: var(--negative-color); }
        .badge.neutral { background: rgba(100, 116, 139, 0.2); color: var(--neutral-color); }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="meter-container">
        <h2>Live Community Vibe</h2>
        <div class="meter-bar">
            <div class="meter-fill" id="vibe-fill"></div>
        </div>
        <!-- FIXED TYPO: id="vibx-score" is now "vibe-score" to match the JavaScript -->
        <div class="score-display" id="vibe-score">⚪ NEUTRAL (0.00)</div>
    </div>

    <div class="chat-container" id="chat-feed">
    </div>

    <script>
        // We will update this exact URL once Render gives us our backend server name
        const ws = new window.WebSocket("wss://vibxlins.onrender.com/ws/pulse");

        const chatFeed = document.getElementById('chat-feed');
        const vibeFill = document.getElementById('vibe-fill');
        const vibeScoreText = document.getElementById('vibe-score');

        let recentScores = [];
        
        // 🛡️ SECURITY (STEP A): Escape HTML characters to prevent XSS attacks
        function escapeHTML(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        ws.onmessage = function(event) {
            const data = JSON.parse(event.data);
            
            recentScores.push(data.score);
            if (recentScores.length > 10) recentScores.shift();
            
            const avgScore = recentScores.reduce((a, b) => a + b, 0) / recentScores.length;
            
            const percentage = ((avgScore + 1) / 2) * 100;
            vibeFill.style.width = `${percentage}%`;

            if (avgScore > 0.2) {
                vibeFill.style.backgroundColor = 'var(--positive-color)';
                vibeScoreText.innerText = `🟢 POSITIVE (${avgScore.toFixed(2)})`;
                vibeScoreText.style.color = 'var(--positive-color)';
            } else if (avgScore < -0.2) {
                vibeFill.style.backgroundColor = 'var(--negative-color)';
                vibeScoreText.innerText = `🔴 NEGATIVE (${avgScore.toFixed(2)})`;
                vibeScoreText.style.color = 'var(--negative-color)';
            } else {
                vibeFill.style.backgroundColor = 'var(--neutral-color)';
                vibeScoreText.innerText = `⚪ NEUTRAL (${avgScore.toFixed(2)})`;
                vibeScoreText.style.color = 'var(--text-main)';
            }

            const msgDiv = document.createElement('div');
            msgDiv.className = 'chat-message';
            
            let badgeClass = 'neutral';
            let badgeText = 'NEUTRAL';
            if (data.score > 0.4) { badgeClass = 'positive'; badgeText = 'POSITIVE'; }
            else if (data.score < -0.4) { badgeClass = 'negative'; badgeText = 'NEGATIVE'; }

            // 🛡️ SECURITY (STEP B): Wrapped data.username and data.message in escapeHTML()
            msgDiv.innerHTML = `
                <span><strong>${escapeHTML(data.username)}</strong>: ${escapeHTML(data.message)}</span>
                <span class="badge ${badgeClass}">${badgeText}</span>
            `;
            
            chatFeed.insertBefore(msgDiv, chatFeed.firstChild);
            if (chatFeed.children.length > 50) {
                chatFeed.removeChild(chatFeed.lastChild);
            }
        };

        ws.onopen = () => console.log("Connected to VibeLine Engine 🟢");
        ws.onclose = () => console.log("Disconnected 🔴");
    </script>
</body>
</html>
